<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>هدية خاصة لك ✨</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; user-select: none; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body { background: linear-gradient(135deg, #0ea5e9 0%, #ec4899 100%); color: #ffffff; width: 100vw; height: 100vh; overflow: hidden; display: flex; justify-content: center; align-items: center; position: relative; }

        .bg-image { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-image: url('bg-landscape.jpg'); background-size: cover; background-position: center; filter: blur(4px) brightness(0.4); z-index: 0; pointer-events: none; }

        /* 🌸 4 ستيكرات خلفية متقابلة */
        .bg-stickers img { position: absolute; opacity: 0.4; pointer-events: none; -webkit-user-drag: none; z-index: 1; }
        .st-1 { top: 10%; right: 5%; width: 90px; transform: rotate(15deg); }
        .st-2 { bottom: 10%; left: 5%; width: 90px; transform: rotate(-15deg); }
        .st-3 { top: 10%; left: 5%; width: 100px; transform: rotate(-15deg); }
        .st-4 { bottom: 10%; right: 5%; width: 100px; transform: rotate(15deg); }

        .app-container { position: relative; z-index: 10; width: 92%; max-width: 420px; display: flex; flex-direction: column; align-items: center; text-align: center; }
        
        .avatar-container { width: 180px; height: 180px; border-radius: 50%; overflow: hidden; border: 4px solid #fff; box-shadow: 0 0 40px rgba(255,255,255,0.3); margin-bottom: 25px; pointer-events: none; }
        .avatar-container img { width: 100%; height: 100%; object-fit: cover; }

        .slide { display: none; flex-direction: column; align-items: center; gap: 20px; width: 100%; }
        .slide.active { display: flex; animation: fadeIn 0.6s forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        h2 { font-size: 26px; font-weight: 900; text-shadow: 0 3px 6px rgba(0,0,0,0.5); }
        
        /* 🖲️ الأزرار المستطيلة 3D بحدود بيضاء */
        .btn-3d {
            padding: 12px 40px; background: rgba(255,255,255,0.1);
            border: 2px solid #ffffff; border-radius: 8px;
            font-size: 18px; font-weight: bold; color: white;
            box-shadow: 0 6px 0 rgba(255,255,255,0.2); transition: all 0.2s;
        }
        .btn-3d:active { transform: translateY(4px); box-shadow: 0 2px 0 rgba(255,255,255,0.2); }

        .action-btns { display: flex; gap: 20px; justify-content: center; align-items: center; width: 100%; position: relative; height: 60px; }
        .btn-yes { background: #10b981; border: 2px solid #fff; color: white; padding: 12px 40px; border-radius: 8px; font-weight: bold; font-size: 18px; box-shadow: 0 6px 0 #065f46; position: relative; z-index: 10; }
        .btn-no { background: #f43f5e; border: 2px solid #fff; color: white; padding: 12px 40px; border-radius: 8px; font-weight: bold; font-size: 18px; box-shadow: 0 6px 0 #9f1239; position: absolute; right: 20%; transition: all 0.3s; z-index: 5; }
    </style>
</head>
<body>
    <div class="bg-image"></div>
    <div class="bg-stickers">
        <img src="bg-sticker1.png" class="st-1" alt="s1">
        <img src="bg-sticker1.png" class="st-2" alt="s1">
        <img src="bg-sticker2.png" class="st-3" alt="s2">
        <img src="bg-sticker2.png" class="st-4" alt="s2">
    </div>

    <div class="app-container">
        <div class="avatar-container"><img id="avatar-img" src="gif1.webp" alt="Avatar"></div>

        <div class="slide active" id="slide-1">
            <h2>هلو <span id="dyn-recipient"></span></h2>
            <button class="btn-3d" onclick="startAudioAndNext(2, 'gif2.gif')">هلااا!</button>
        </div>

        <div class="slide" id="slide-2">
            <h2 id="dyn-q1">عندي رسالة الج</h2>
            <button class="btn-3d" onclick="goToSlide(3, 'gif3.gif')">شنو الرسالة !! ؟</button>
        </div>

        <div class="slide" id="slide-3">
            <div class="message-box" id="dyn-message"></div>
            <button class="btn-3d" onclick="goToSlide(4, 'gif4.gif')">اضغطي للمتابعة</button>
        </div>

        <div class="slide" id="slide-4">
            <h2 id="dyn-q2">تحبيني ؟</h2>
            <div class="action-btns">
                <button class="btn-yes" onclick="goToYesSequence()">اي</button>
                <button class="btn-no" id="btn-no" onclick="handleNo()">لا</button>
            </div>
        </div>

        <div class="slide" id="slide-8">
            <h2 id="dyn-q5">وأني هم أموت بيج 🩷🥹</h2>
            <button class="btn-3d" onclick="goToSlide(9, 'gif9.gif')">أأاااانني همممم 🥹🫶</button>
        </div>

        <div class="slide" id="slide-9">
            <h2 id="dyn-q6">أحبببججججج موووووتت</h2>
            <button class="btn-3d" onclick="startFinalSequence()">أأحبببببببكككك 🥹🥹</button>
        </div>

        <div class="slide" id="slide-10">
            <h2 id="dyn-q7">أحبببججج حبب حببب هوااااااييييي</h2>
            <div class="final-percent" id="love-counter">0%</div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const gender = urlParams.get('gender') || 'female';
        const isMale = (gender === 'male');
        
        document.getElementById('dyn-recipient').innerText = urlParams.get('recipient') || 'صديقي';
        document.getElementById('dyn-message').innerHTML = (urlParams.get('message') || 'رسالة خاصة لك...').replace(/\n/g, '<br>');
        
        document.getElementById('dyn-q1').innerText = isMale ? "عندي رسالة الك" : "عندي رسالة الج";
        document.getElementById('dyn-q2').innerText = isMale ? "تحبني ؟" : "تحبيني ؟";

        let escapeCount = 0;
        function handleNo() {
            escapeCount++;
            const btn = document.getElementById('btn-no');
            if (escapeCount >= 4) {
                // يتخفى خلف زر "اي"
                btn.style.right = '50%';
                btn.style.marginRight = '-55px';
                btn.style.transform = 'translate(25px, 5px) rotate(-6deg)';
                btn.onclick = goToYesSequence;
            } else {
                const x = Math.random() * 160 - 80;
                const y = Math.random() * 100 - 50;
                btn.style.transform = `translate(${x}px, ${y}px)`;
            }
        }

        function goToSlide(num, gif) {
            document.querySelectorAll('.slide').forEach(s => s.classList.remove('active'));
            document.getElementById('slide-' + num).classList.add('active');
            if(gif) document.getElementById('avatar-img').src = gif;
        }

        function goToYesSequence() { goToSlide(8, 'gif8.gif'); }

        function startFinalSequence() {
            goToSlide(10, 'gif10.gif');
            const counter = document.getElementById('love-counter');
            let i = 0;
            const interval = setInterval(() => {
                counter.innerText = Math.floor(Math.random() * 999999999) + '%';
                if(i++ > 30) { clearInterval(interval); counter.innerText = '100000000000%'; }
            }, 100);
        }
    </script>
</body>
</html>
